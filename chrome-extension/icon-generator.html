<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Generate Extension Icons</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f0f0f0;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 8px;
    }
    canvas {
      border: 2px solid #ddd;
      margin: 10px;
    }
    button {
      background: #4CAF50;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin: 5px;
    }
    button:hover {
      background: #45a049;
    }
    .preview {
      display: flex;
      gap: 20px;
      margin: 20px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Extension Icon Generator</h1>
    <p>Click the buttons below to download the required icon sizes for your Chrome extension.</p>
    
    <div class="preview">
      <div>
        <h3>16x16</h3>
        <canvas id="canvas16" width="16" height="16"></canvas>
        <br>
        <button onclick="downloadIcon(16)">Download 16x16</button>
      </div>
      <div>
        <h3>48x48</h3>
        <canvas id="canvas48" width="48" height="48"></canvas>
        <br>
        <button onclick="downloadIcon(48)">Download 48x48</button>
      </div>
      <div>
        <h3>128x128</h3>
        <canvas id="canvas128" width="128" height="128"></canvas>
        <br>
        <button onclick="downloadIcon(128)">Download 128x128</button>
      </div>
    </div>
    
    <button onclick="downloadAll()">Download All Icons</button>
  </div>

  <script>
    function drawIcon(size) {
      const canvas = document.getElementById('canvas' + size);
      const ctx = canvas.getContext('2d');
      
      // Clear canvas
      ctx.clearRect(0, 0, size, size);
      
      // Background gradient
      const gradient = ctx.createLinearGradient(0, 0, size, size);
      gradient.addColorStop(0, '#667eea');
      gradient.addColorStop(1, '#764ba2');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, size, size);
      
      // Draw plug icon
      ctx.strokeStyle = 'white';
      ctx.fillStyle = 'white';
      ctx.lineWidth = size / 16;
      
      const centerX = size / 2;
      const centerY = size / 2;
      const scale = size / 48;
      
      // Socket body
      ctx.beginPath();
      ctx.arc(centerX, centerY, 10 * scale, 0, Math.PI * 2);
      ctx.stroke();
      
      // Plug pins (top)
      ctx.fillRect(centerX - 6 * scale, centerY - 16 * scale, 3 * scale, 8 * scale);
      ctx.fillRect(centerX + 3 * scale, centerY - 16 * scale, 3 * scale, 8 * scale);
      
      // Wave lines (representing data/signals)
      ctx.beginPath();
      ctx.moveTo(centerX - 12 * scale, centerY);
      ctx.lineTo(centerX - 8 * scale, centerY - 3 * scale);
      ctx.lineTo(centerX - 4 * scale, centerY);
      ctx.stroke();
      
      ctx.beginPath();
      ctx.moveTo(centerX + 4 * scale, centerY);
      ctx.lineTo(centerX + 8 * scale, centerY - 3 * scale);
      ctx.lineTo(centerX + 12 * scale, centerY);
      ctx.stroke();
    }
    
    function downloadIcon(size) {
      const canvas = document.getElementById('canvas' + size);
      canvas.toBlob(function(blob) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `icon${size}.png`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      });
    }
    
    function downloadAll() {
      downloadIcon(16);
      setTimeout(() => downloadIcon(48), 200);
      setTimeout(() => downloadIcon(128), 400);
    }
    
    // Draw all icons on load
    drawIcon(16);
    drawIcon(48);
    drawIcon(128);
  </script>
</body>
</html>
